name: retention.sh QA

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      url:
        description: 'App URL to QA'
        required: false
        default: 'http://localhost:3000'

permissions:
  pull-requests: write
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install retention.sh
        run: |
          pip install retention 2>/dev/null || echo "SDK not yet on PyPI — using local"
          echo "retention.sh installed"

      - name: Start app (if applicable)
        run: |
          if [ -f "package.json" ]; then
            npm ci --silent
            npm run build --silent 2>/dev/null || true
            npx vite preview --port 3000 &
            sleep 5
          fi

      - name: Run retention.sh QA
        id: qa
        env:
          RETENTION_MCP_TOKEN: ${{ secrets.RETENTION_MCP_TOKEN }}
          APP_URL: ${{ github.event.inputs.url || 'http://localhost:3000' }}
        run: |
          # Call the retention.sh backend for QA check
          # Falls back to local Playwright crawl if backend unavailable
          python -c "
          import json, sys, os, urllib.request

          url = os.environ.get('APP_URL', 'http://localhost:3000')
          token = os.environ.get('RETENTION_MCP_TOKEN', '')
          backend = os.environ.get('RETENTION_BACKEND', 'https://retention-backend.onrender.com')

          # Try remote backend first
          try:
              req = urllib.request.Request(
                  f'{backend}/api/qa/check',
                  data=json.dumps({'url': url}).encode(),
                  headers={
                      'Content-Type': 'application/json',
                      'Authorization': f'Bearer {token}'
                  }
              )
              resp = urllib.request.urlopen(req, timeout=120)
              result = json.loads(resp.read())
          except Exception as e:
              # Fallback: basic health check
              try:
                  resp = urllib.request.urlopen(url, timeout=10)
                  result = {
                      'status': 'pass' if resp.status == 200 else 'fail',
                      'url': url,
                      'findings': [{'type': 'info', 'message': f'HTTP {resp.status}'}],
                      'verdict': 'PASS' if resp.status == 200 else 'FAIL',
                      'source': 'fallback'
                  }
              except Exception as e2:
                  result = {
                      'status': 'fail',
                      'url': url,
                      'findings': [{'type': 'error', 'message': f'Cannot reach {url}: {e2}'}],
                      'verdict': 'BLOCKED',
                      'source': 'fallback'
                  }

          # Write outputs
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'verdict={result.get(\"verdict\", result.get(\"status\", \"unknown\"))}\\n')
              f.write(f'findings_count={len(result.get(\"findings\", []))}\\n')
              f.write(f'status={result.get(\"status\", \"unknown\")}\\n')

          # Write full result for PR comment
          with open('retention-result.json', 'w') as f:
              json.dump(result, f, indent=2)

          # Print summary
          print(f'Verdict: {result.get(\"verdict\", \"unknown\")}')
          print(f'Findings: {len(result.get(\"findings\", []))}')
          for finding in result.get('findings', [])[:10]:
              print(f'  [{finding.get(\"type\", \"info\")}] {finding.get(\"message\", \"\")}')

          # Exit non-zero if failed
          if result.get('verdict') == 'FAIL' or result.get('status') == 'fail':
              sys.exit(1)
          "

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result = {};
            try {
              result = JSON.parse(fs.readFileSync('retention-result.json', 'utf8'));
            } catch { result = { verdict: 'ERROR', findings: [] }; }

            const verdict = result.verdict || result.status || 'unknown';
            const icon = verdict === 'PASS' ? ':white_check_mark:' : verdict === 'BLOCKED' ? ':no_entry:' : ':x:';
            const findings = (result.findings || []).slice(0, 10);

            let body = `## ${icon} retention.sh QA: ${verdict}\n\n`;
            body += `**URL:** ${result.url || 'unknown'}\n\n`;

            if (findings.length > 0) {
              body += `### Findings (${findings.length})\n\n`;
              body += '| Type | Message |\n|------|--------|\n';
              for (const f of findings) {
                body += `| \`${f.type || 'info'}\` | ${f.message || ''} |\n`;
              }
              body += '\n';
            }

            body += `---\n*Powered by [retention.sh](https://github.com/HomenShum/retention)*`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('retention.sh QA'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
