[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "retention-sh"
version = "0.1.0"
description = "Drop-in agent observability — track every tool call, find waste, prove savings."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "retention.sh", email = "hello@retention.com" }]
keywords = ["ai", "agent", "observability", "mcp", "claude", "openai", "langchain"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Testing",
]

# Zero required dependencies — all provider SDKs are optional
dependencies = []

[project.optional-dependencies]
openai = ["openai>=1.0"]
anthropic = ["anthropic>=0.20"]
langchain = ["langchain-core>=0.2"]
crewai = ["crewai>=0.50"]
all = ["openai>=1.0", "anthropic>=0.20", "langchain-core>=0.2"]

[project.urls]
Homepage = "https://retention.sh"
Documentation = "https://test-studio-xi.vercel.app/docs/sdk"
Repository = "https://github.com/HomenShum/retention-sdk"
